<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Rust + eframe WASM</title>
    <style>
        html, body { margin: 0; height: 100%; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="the_canvas"></canvas>

    <script type="module">
        import init, { start } from "./pkg/rust_hello.js";

        async function main() {
            await init();              // loads wasm
            await start("the_canvas"); // calls your Rust function
        }

        main();
    </script>
</body>
</html>
