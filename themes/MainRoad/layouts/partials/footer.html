<footer class="footer">
	<div class="container footer__container flex">
		{{ partial "footer_links.html" . }}
		<div class="footer__copyright">
			&copy; {{ now.Format "2006" }} {{ .Site.Params.copyright | default .Site.Title }}.
			<span class="footer__copyright-credits">{{ T "footer_credits" | safeHTML }}</span>
		</div>
	</div>
</footer>

<div id="footer-clock"></div>

<script type="module">
  import init, * as wasm from "/rust_kw/pkg/hello_kw.js";

  init().then(() => {
    const el = document.getElementById("footer-clock");

    async function update() {
      el.textContent = await wasm.current_timestamp_with_kw();
    }

    update();
    setInterval(update, 1000);
  });
</script>
